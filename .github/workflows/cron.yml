name: Monitor SECOP II Cron

on:
  schedule:
    - cron: '0 * * * *' # Se ejecuta cada hora (en el minuto 0)
  workflow_dispatch: # Permite ejecutarlo manualmente desde la web de GitHub por si quieres probar

jobs:
  ping-api:
    runs-on: ubuntu-latest
    steps:
      - name: Despertar Bot de SECOP (Vercel)
        run: curl -sS https://secop-monitor-cyan.vercel.app/api/monitor
